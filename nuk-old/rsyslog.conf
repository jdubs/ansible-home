# rsyslog config for centralized syslog collection
# Listens on UDP 514 and TCP 514

module(load="imudp")
input(type="imudp" port="514")

module(load="imtcp")
input(type="imtcp" port="514")

# Template: per-host log files
template(name="RemoteHostLog" type="string"
    string="/data0/syslog/%HOSTNAME%/syslog.log"
)

template(name="RemoteHostAuth" type="string"
    string="/data0/syslog/%HOSTNAME%/auth.log"
)

# Remote logs go to per-host directories (using dynafile for dynamic paths)
*.* action(type="omfile" dynaFile="RemoteHostLog")
auth,authpriv.* action(type="omfile" dynaFile="RemoteHostAuth")

# Fluent Bit configuration — receive syslog from network devices (Unifi, etc.)
[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# Syslog input — bind on TCP only (UDP port 514 is owned by host rsyslogd)
[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         514
    Tag          network.*

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         1514
    Tag          unifi.*

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         2514
    Tag          j100.*

[OUTPUT]
    Name         http
    Match        *
    Host         loki
    Port         3100
    URI          /loki/api/v1/push
    Format       json
    Header       X-Custom-Header  Fluent-Bit-Forwarder
    Retry_Limit  5

# Fluent Bit configuration — receive syslog from network devices (Unifi, etc.)
[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name         syslog
    Listen       0.0.0.0
    Port         514
    Parser       syslog-rfc5424
    Tag          network.*
    Buffer_Max_Size 10M

[INPUT]
    Name         syslog
    Listen       0.0.0.0
    Port         1514
    Parser       syslog
    Tag          unifi.*
    Buffer_Max_Size 10M

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         2514
    Tag          j100.*
    Buffer_Max_Size 10M

[OUTPUT]
    Name         http
    Match        *
    Host         loki
    Port         3100
    URI          /loki/api/v1/push
    Format       json
    Header       X-Custom-Header  Fluent-Bit-Forwarder
    Retry_Limit  5
    JSON_Array  On

[OUTPUT]
    Name         file
    Match        *
    File         /fluent-bit/data/raw.log
    Format       json
    Buffer_Size  5M

# Fluent Bit parsers
[PARSER]
    Name         syslog-rfc5424
    Format       regex
    Regex        ^\<([0-9]+)\>([0-9]+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s*(.*)$
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S%z

[PARSER]
    Name         syslog
    Format       regex
    Regex        ^\<([0-9]+)\>(\w+\s+\d+\s+\d+:\d+:\d+)\s+(\S+)\s+(\S+)\s*(.*)$
    Time_Key     time
    Time_Format  %b %d %H:%M:%S

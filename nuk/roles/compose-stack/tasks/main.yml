# Deploy Docker Compose services

- name: Create compose project directory
  ansible.builtin.file:
    path: "{{ compose_project_dir }}"
    state: directory
    mode: '0755'

- name: Create data directories
  ansible.builtin.file:
    path: "{{ data_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - grafana/data
    - prometheus/data
    - loki/data
    - promtail/data
    - fluent-bit/data
    - uptime-kuma/data
    - nginx/ssl

- name: Deploy Grafana configuration
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ data_dir }}/grafana/data/grafana.ini"
    mode: '0644'

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ compose_project_dir }}/docker-compose.yml"
    mode: '0644'

- name: Deploy Loki config
  ansible.builtin.copy:
    src: loki/loki-config.yaml
    dest: "{{ data_dir }}/loki/loki-config.yaml"
    mode: '0644'

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ data_dir }}/prometheus/prometheus.yml"
    mode: '0644'

- name: Deploy Promtail config
  ansible.builtin.copy:
    src: promtail/config.yaml
    dest: "{{ data_dir }}/promtail/config.yaml"
    mode: '0644'

- name: Deploy Fluent Bit config
  ansible.builtin.copy:
    src: fluent-bit/fluent-bit.conf
    dest: "{{ data_dir }}/fluent-bit/fluent-bit.conf"
    mode: '0644'

- name: Deploy Fluent Bit parsers
  ansible.builtin.copy:
    src: fluent-bit/parsers.conf
    dest: "{{ data_dir }}/fluent-bit/parsers.conf"
    mode: '0644'

- name: Pull latest images
  community.docker.docker_compose_v2:
    project_src: "{{ compose_project_dir }}"
    files:
      - docker-compose.yml
    pull: always
    state: present

- name: Start services
  community.docker.docker_compose_v2:
    project_src: "{{ compose_project_dir }}"
    files:
      - docker-compose.yml
    state: present

- name: Wait for services to be healthy
  ansible.builtin.wait_for:
    host: "0.0.0.0"
    port: 80
    delay: 10
    timeout: 120
    state: started

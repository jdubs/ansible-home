# Nginx role — deploy reverse proxy with Let's Encrypt

- name: Create Nginx directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ nginx_data_dir }}/config"
    - "{{ nginx_data_dir }}/data"
    - "{{ nginx_data_dir }}/logs"

- name: Deploy Nginx reverse proxy configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ nginx_data_dir }}/config/nginx.conf"
    mode: '0644'

- name: Restart Nginx to pick up new config
  ansible.builtin.command: docker compose -f {{ compose_project_dir }}/docker-compose.yml restart nginx
  changed_when: true
  args:
    chdir: "{{ compose_project_dir }}"

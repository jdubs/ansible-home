apiVersion: 1
kind: datasources       # <-- Internal Grafana plugin expects plural 'datasources'
name: nuk-datasources-config
metadata:
  name: grafana-datasources
data:
  datasources:          # <-- This must match the kind type
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true
      jsonData:
        timeInterval: 15s
        httpMethod: POST
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false
      editable: true
      jsonData:
        maxLines: 1000

# Nuk System - Grafana dashboard providers config
apiVersion: 1
kind: GrafanaConfig
data:
  providers:
    - metadata:
        name: default-provider
      data:
        name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

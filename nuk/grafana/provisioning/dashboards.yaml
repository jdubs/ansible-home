# Nuk System - Grafana folder provisioning
apiVersion: 1
kind: GrafanaConfig
name: nuk-folders-config
metadata:
  name: grafana-folders
data:
  folders:
    - metadata:
        name: nuk-system-folder
      data:
        title: Nuk System
        uid: nuk-system
        orgId: 1
        parentUid: ''
        readOnly: false

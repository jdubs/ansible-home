apiVersion: 1
kind: GrafanaConfig
name: nuk-datasources-config
metadata:
  name: grafana-datasources
data:
  datasources:
    - metadata:
        name: prometheus-datasource
      data:
        name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s
          httpMethod: POST
    - metadata:
        name: loki-datasource
      data:
        name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000
